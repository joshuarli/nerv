[env]
# Slim down the bundled SQLite build. libsqlite3-sys's build.rs unconditionally
# enables several SQLite features nerv doesn't use. LIBSQLITE3_FLAGS lets us
# append extra -D/-U flags to the cc::Build invocation.
#
# We keep:   SQLITE_CORE, DEFAULT_FOREIGN_KEYS, ENABLE_FTS5, THREADSAFE, USE_URI,
#            ENABLE_MEMORY_MANAGEMENT, ENABLE_LOAD_EXTENSION (hardcoded, harmless)
#
# We omit:   FTS3 / FTS3_PARENTHESIS, R*Tree, SOUNDEX, STAT4,
#            DBSTAT_VTAB, API_ARMOR, COLUMN_METADATA, JSON1
LIBSQLITE3_FLAGS = "-USQLITE_ENABLE_FTS3 -USQLITE_ENABLE_FTS3_PARENTHESIS -USQLITE_ENABLE_RTREE -USQLITE_SOUNDEX -USQLITE_ENABLE_STAT4 -USQLITE_ENABLE_DBSTAT_VTAB -USQLITE_ENABLE_API_ARMOR -USQLITE_ENABLE_COLUMN_METADATA -USQLITE_ENABLE_JSON1"
